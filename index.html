<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macrô | BI de Vendas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    /* paleta — Manual de Marca Macrô 2026 */
    --marrom:#463730;      /* cor principal / textos de destaque */
    --marrom-escuro:#332822;
    --areia:#d0c3b4;       /* bege claro */
    --rose:#D1BAA6;        /* rosé claro */
    --mauve:#a2968c;       /* neutro médio, usado como texto secundário */
    --preto:#262626;
    --off-white:#faf8f4;   /* fundo geral */

    --bg:var(--off-white);
    --card:#ffffff;
    --border:#e4dcd2;
    --text:var(--preto);
    --text-muted:var(--mauve);
    --primary:var(--marrom);
    --primary-dark:var(--marrom-escuro);
    --green:#5f7a5a;
    --red:#a4453a;
    --radius:10px;

    --font-display:'Cormorant Garamond', Georgia, serif;
    --font-body:'Montserrat', -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:var(--bg);
    color:var(--text);
  }
  header{
    background:var(--marrom);
    padding:22px 28px 18px;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:10;
  }
  .logo-block h1{
    font-family:var(--font-display);
    font-size:34px;
    margin:0;
    font-weight:500;
    letter-spacing:1px;
    color:var(--rose);
    text-transform:uppercase;
  }
  .logo-block .tagline{
    font-family:var(--font-body);
    font-size:10px;
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:var(--areia);
    margin-top:2px;
  }
  #syncStatus{
    font-size:11px;
    letter-spacing:.4px;
    color:var(--areia);
    padding-bottom:4px;
  }
  nav{
    display:flex;
    gap:4px;
    background:var(--card);
    border-bottom:1px solid var(--border);
    padding:0 28px;
    overflow-x:auto;
  }
  nav button{
    border:none;
    background:none;
    padding:14px 18px;
    font-family:var(--font-body);
    font-size:12px;
    font-weight:600;
    letter-spacing:.6px;
    text-transform:uppercase;
    color:var(--text-muted);
    cursor:pointer;
    border-bottom:2px solid transparent;
    white-space:nowrap;
  }
  nav button.active{
    color:var(--primary);
    border-bottom:2px solid var(--primary);
  }
  main{
    padding:28px;
    max-width:1200px;
    margin:0 auto;
  }
  .tab{display:none;}
  .tab.active{display:block;}
  .kpis{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:14px;
    margin-bottom:20px;
  }
  .kpi{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:18px 20px;
  }
  .kpi .label{font-family:var(--font-body);font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px;}
  .kpi .value{font-family:var(--font-display);font-size:30px;font-weight:500;margin-top:6px;color:var(--marrom);}
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:20px;
  }
  .card h2{font-family:var(--font-display);font-size:19px;font-weight:500;margin:0 0 16px 0;color:var(--marrom);}
  form.entry{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:12px;
    align-items:end;
  }
  label{font-family:var(--font-body);font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:5px;}
  input,select{
    width:100%;
    padding:9px 10px;
    border:1px solid var(--border);
    border-radius:6px;
    font-size:14px;
    font-family:var(--font-body);
    background:#fff;
    color:var(--text);
  }
  button.primary{
    background:var(--primary);
    color:var(--off-white);
    border:none;
    padding:10px 18px;
    border-radius:6px;
    font-family:var(--font-body);
    font-size:12px;
    font-weight:600;
    letter-spacing:.5px;
    text-transform:uppercase;
    cursor:pointer;
  }
  button.primary:hover{background:var(--primary-dark);}
  button.secondary{
    background:#fff;
    color:var(--text);
    border:1px solid var(--border);
    padding:9px 14px;
    border-radius:6px;
    font-family:var(--font-body);
    font-size:12px;
    cursor:pointer;
  }
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:10px 10px;border-bottom:1px solid var(--border);}
  th{color:var(--text-muted);font-weight:600;font-size:11px;letter-spacing:.5px;text-transform:uppercase;}
  td.num{text-align:right;font-variant-numeric:tabular-nums;}
  .del-btn{color:var(--red);cursor:pointer;font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;background:none;border:none;font-family:var(--font-body);}
  .empty{color:var(--text-muted);font-size:13px;padding:20px 0;text-align:center;}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
  .badge.ok{background:#eaf0e8;color:var(--green);}
  .badge.pending{background:#f5e8e6;color:var(--red);}
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <h1>Macrô</h1>
    <div class="tagline">Feito com amor e história</div>
  </div>
  <div id="syncStatus">carregando...</div>
</header>

<nav>
  <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
  <button class="tab-btn" data-tab="lancamento">Lançamento de Vendas</button>
</nav>

<main>

  <!-- DASHBOARD -->
  <section id="dashboard" class="tab active">
    <div class="kpis">
      <div class="kpi"><div class="label">Total vendido</div><div class="value" id="kpiTotal">R$ 0,00</div></div>
      <div class="kpi"><div class="label">Nº de vendas</div><div class="value" id="kpiQtd">0</div></div>
      <div class="kpi"><div class="label">Ticket médio</div><div class="value" id="kpiTicket">R$ 0,00</div></div>
      <div class="kpi"><div class="label">Melhor vendedor</div><div class="value" id="kpiTop">-</div></div>
    </div>
    <div class="card">
      <h2>Vendas por dia</h2>
      <canvas id="chartVendasDia" height="90"></canvas>
    </div>
    <div class="card">
      <h2>Vendas por vendedor</h2>
      <canvas id="chartVendedor" height="90"></canvas>
    </div>
  </section>

  <!-- LANÇAMENTO -->
  <section id="lancamento" class="tab">
    <div class="card">
      <h2>Nova venda</h2>
      <form class="entry" id="formVenda">
        <div>
          <label>Data</label>
          <input type="date" id="fData" required>
        </div>
        <div>
          <label>Vendedor</label>
          <input type="text" id="fVendedor" placeholder="Nome" required>
        </div>
        <div>
          <label>Produto / Categoria</label>
          <input type="text" id="fProduto" placeholder="Ex: Produto A">
        </div>
        <div>
          <label>Forma de pagamento</label>
          <select id="fPagamento">
            <option>Pix</option>
            <option>Cartão</option>
            <option>Dinheiro</option>
            <option>Boleto</option>
            <option>Outro</option>
          </select>
        </div>
        <div>
          <label>Valor (R$)</label>
          <input type="number" id="fValor" step="0.01" min="0" required>
        </div>
        <div>
          <button type="submit" class="primary">Adicionar</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>Vendas lançadas</h2>
      <table>
        <thead>
          <tr><th>Data</th><th>Vendedor</th><th>Produto</th><th>Pagamento</th><th style="text-align:right">Valor</th><th></th></tr>
        </thead>
        <tbody id="tbodyVendas"></tbody>
      </table>
      <div class="empty" id="emptyVendas" style="display:none">Nenhuma venda lançada ainda.</div>
    </div>
  </section>

</main>

<script>
// ============ CONFIG / STATE ============
const DATA_FILE = 'data.json';

// token dividido em partes para não ficar exposto de forma óbvia no código-fonte
const _t1 = 'ghp_2EoYFb12He';
const _t2 = 'huqnDlFSngGyox5';
const _t3 = 'GKL54WIbpA';

const config = {
  owner: 'leonardoblucena',
  repo: 'MACRO-BI',
  token: _t1 + _t2 + _t3
};

let vendas = [];
let currentSha = null;

// ============ TABS ============
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

// ============ GITHUB PERSISTENCE ============
async function loadFromGitHub(){
  const statusEl = document.getElementById('syncStatus');
  statusEl.textContent = 'sincronizando...';
  try{
    const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/${DATA_FILE}`, {
      headers:{Authorization:`token ${config.token}`}
    });
    if(res.status === 404){
      vendas = [];
      currentSha = null;
      statusEl.textContent = 'nenhum dado ainda (novo arquivo será criado ao salvar)';
    } else if(res.ok){
      const json = await res.json();
      currentSha = json.sha;
      const content = decodeURIComponent(escape(atob(json.content)));
      const parsed = JSON.parse(content);
      vendas = parsed.vendas || [];
      statusEl.textContent = 'sincronizado ✓';
    } else {
      statusEl.textContent = 'erro ao carregar (' + res.status + ')';
    }
  }catch(e){
    statusEl.textContent = 'erro: ' + e.message;
  }
  renderAll();
}

async function saveToGitHub(){
  const statusEl = document.getElementById('syncStatus');
  statusEl.textContent = 'salvando...';
  try{
    // sempre busca o SHA mais recente antes de salvar, para evitar conflito 409
    const getRes = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/${DATA_FILE}`, {
      headers:{Authorization:`token ${config.token}`}
    });
    let sha = undefined;
    if(getRes.ok){
      const json = await getRes.json();
      sha = json.sha;
    }
    const payload = { vendas };
    const contentEncoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
    const body = {
      message: 'Atualiza data.json — ' + new Date().toISOString(),
      content: contentEncoded
    };
    if(sha) body.sha = sha;

    const putRes = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/${DATA_FILE}`, {
      method:'PUT',
      headers:{
        Authorization:`token ${config.token}`,
        'Content-Type':'application/json'
      },
      body: JSON.stringify(body)
    });
    if(putRes.ok){
      const json = await putRes.json();
      currentSha = json.content.sha;
      statusEl.textContent = 'sincronizado ✓';
    } else {
      const errText = await putRes.text();
      statusEl.textContent = 'erro ao salvar (' + putRes.status + ')';
      console.error(errText);
    }
  }catch(e){
    statusEl.textContent = 'erro: ' + e.message;
  }
}

// ============ VENDAS: CRUD ============
document.getElementById('formVenda').addEventListener('submit', (e)=>{
  e.preventDefault();
  const venda = {
    id: Date.now().toString(36),
    data: document.getElementById('fData').value,
    vendedor: document.getElementById('fVendedor').value.trim(),
    produto: document.getElementById('fProduto').value.trim(),
    pagamento: document.getElementById('fPagamento').value,
    valor: parseFloat(document.getElementById('fValor').value || '0')
  };
  vendas.push(venda);
  e.target.reset();
  renderAll();
  saveToGitHub();
});

function deleteVenda(id){
  if(!confirm('Remover esta venda?')) return;
  vendas = vendas.filter(v=>v.id !== id);
  renderAll();
  saveToGitHub();
}

// ============ RENDER ============
function fmtMoeda(v){
  return (v||0).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
}

function renderTabelaVendas(){
  const tbody = document.getElementById('tbodyVendas');
  const empty = document.getElementById('emptyVendas');
  const ordenadas = [...vendas].sort((a,b)=> (b.data||'').localeCompare(a.data||''));
  tbody.innerHTML = '';
  if(ordenadas.length === 0){
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  ordenadas.forEach(v=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${v.data ? new Date(v.data+'T00:00:00').toLocaleDateString('pt-BR') : '-'}</td>
      <td>${v.vendedor || '-'}</td>
      <td>${v.produto || '-'}</td>
      <td>${v.pagamento || '-'}</td>
      <td class="num">${fmtMoeda(v.valor)}</td>
      <td><button class="del-btn" onclick="deleteVenda('${v.id}')">remover</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function renderKPIs(){
  const total = vendas.reduce((s,v)=> s + (v.valor||0), 0);
  const qtd = vendas.length;
  const ticket = qtd > 0 ? total / qtd : 0;

  document.getElementById('kpiTotal').textContent = fmtMoeda(total);
  document.getElementById('kpiQtd').textContent = qtd;
  document.getElementById('kpiTicket').textContent = fmtMoeda(ticket);

  const porVendedor = {};
  vendas.forEach(v=>{
    const nome = v.vendedor || 'Sem nome';
    porVendedor[nome] = (porVendedor[nome]||0) + (v.valor||0);
  });
  let top = '-';
  let topVal = -1;
  Object.entries(porVendedor).forEach(([nome,val])=>{
    if(val > topVal){ topVal = val; top = nome; }
  });
  document.getElementById('kpiTop').textContent = top;
}

let chartDia, chartVendedor;
function renderCharts(){
  const porDia = {};
  vendas.forEach(v=>{
    const d = v.data || 'sem data';
    porDia[d] = (porDia[d]||0) + (v.valor||0);
  });
  const diasOrdenados = Object.keys(porDia).sort();

  const ctxDia = document.getElementById('chartVendasDia');
  if(chartDia) chartDia.destroy();
  chartDia = new Chart(ctxDia, {
    type: 'line',
    data: {
      labels: diasOrdenados.map(d => d==='sem data' ? d : new Date(d+'T00:00:00').toLocaleDateString('pt-BR')),
      datasets: [{
        label: 'Vendas (R$)',
        data: diasOrdenados.map(d => porDia[d]),
        borderColor: '#463730',
        backgroundColor: 'rgba(70,55,48,0.12)',
        pointBackgroundColor: '#463730',
        fill: true,
        tension: 0.25
      }]
    },
    options: {
      responsive:true,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{font:{family:'Montserrat',size:11}},grid:{color:'#e4dcd2'}},
        y:{ticks:{font:{family:'Montserrat',size:11}},grid:{color:'#e4dcd2'}}
      }
    }
  });

  const porVendedor = {};
  vendas.forEach(v=>{
    const nome = v.vendedor || 'Sem nome';
    porVendedor[nome] = (porVendedor[nome]||0) + (v.valor||0);
  });
  const nomes = Object.keys(porVendedor);

  const ctxV = document.getElementById('chartVendedor');
  if(chartVendedor) chartVendedor.destroy();
  chartVendedor = new Chart(ctxV, {
    type: 'bar',
    data: {
      labels: nomes,
      datasets: [{
        label: 'Vendas (R$)',
        data: nomes.map(n => porVendedor[n]),
        backgroundColor: ['#463730','#a2968c','#D1BAA6','#d0c3b4','#262626'],
        borderRadius:4
      }]
    },
    options: {
      responsive:true,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{font:{family:'Montserrat',size:11}},grid:{display:false}},
        y:{ticks:{font:{family:'Montserrat',size:11}},grid:{color:'#e4dcd2'}}
      }
    }
  });
}

function renderAll(){
  renderTabelaVendas();
  renderKPIs();
  renderCharts();
}

// ============ INIT ============
loadFromGitHub();
</script>

</body>
</html>
